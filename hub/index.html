<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hub</title>
    <meta name="robots" content="index, follow" />
    <meta name="google-adsense-account" content="ca-pub-9043552187427888" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9043552187427888"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="canonical" href="https://www.ojalkhatiwada.com.np/hub/" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="icon" type="image/jpeg" href="/favicon.ico" />
  </head>
  <body>
    <nav class="top-nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/apps/" class="nav-link">Apps</a>
      <a href="/downloads/" class="nav-link">Downloads</a>
      <a href="/hub/" class="nav-link active">Hub</a>
    </nav>

    <main style="max-width: 600px !important">
      <header style="margin-bottom: 1.5rem">
        <h1>Community Hub</h1>
        <div id="user_info">
          <img id="user_avatar" class="profile-pic" style="display: none" />
          <span
            id="user_display"
            style="color: var(--green); font-weight: 600"
          ></span>
          <a
            id="loginBtn"
            href="/forums/auth/"
            class="tab-btn"
            style="color: var(--sky); padding: 4px 8px; text-decoration: none"
          >
            [login]
          </a>
          <button
            id="logoutBtn"
            class="tab-btn"
            style="color: var(--mauve); padding: 4px 8px"
          >
            [exit]
          </button>
        </div>
      </header>

      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          id="global_search"
          placeholder="Search threads or bug IDs..."
        />
      </div>

      <div class="tabs">
        <button
          type="button"
          class="tab-btn active"
          onclick="showPage(event, 'discussion')"
        >
          Discussion
        </button>
        <button
          type="button"
          class="tab-btn"
          onclick="showPage(event, 'bug-tracker')"
        >
          Bug Tracker
        </button>
      </div>

      <section id="discussion" class="page active">
        <div id="post_editor" style="margin-bottom: 2rem">
          <input
            id="thread_title"
            type="text"
            placeholder="Thread title"
            maxlength="120"
          />
          <textarea
            id="thread_input"
            placeholder="Open a thread with context, question, or proposal..."
            style="min-height: 120px; margin-top: 0.75rem"
          ></textarea>
          <div
            style="display: flex; justify-content: flex-end; margin-top: 1rem"
          >
            <button id="submit_thread">
              <i class="fa-solid fa-paper-plane" style="margin-right: 8px"></i
              >Start Thread
            </button>
          </div>
        </div>
        <div id="posts_loading" class="tagline">
          Intercepting data packets...
        </div>
        <div id="posts_list" class="grid"></div>
      </section>

      <section id="bug-tracker" class="page">
        <div class="grid" style="margin-bottom: 2rem">
          <input
            type="text"
            id="bug_title"
            placeholder="Bug summary | Project"
          />
          <textarea
            id="bug_desc"
            placeholder="Steps to reproduce..."
            style="min-height: 80px"
          ></textarea>
          <div
            style="display: flex; justify-content: flex-end; margin-top: 1rem"
          >
            <button id="submit_bug">
              <i class="fa-solid fa-bug" style="margin-right: 8px"></i>Report
            </button>
          </div>
        </div>
        <div id="bugs_list" class="grid"></div>
      </section>

      <p id="copy-toast" class="toast"></p>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        query,
        orderBy,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
      import { getFirebaseConfig } from "/assets/js/firebase-config.js";

      const firebaseConfig = getFirebaseConfig();

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const postsCol = collection(db, "posts");
      const bugsCol = collection(db, "bugs");
      const MAX_THREAD_TITLE_LENGTH = 120;
      const MAX_THREAD_BODY_LENGTH = 2400;
      const MAX_REPLY_LENGTH = 1200;
      const MAX_BUG_TITLE_LENGTH = 120;
      const MAX_BUG_DESC_LENGTH = 2400;
      const avatarHostAllowlist = new Set([
        "lh3.googleusercontent.com",
        "avatars.githubusercontent.com",
        "ui-avatars.com",
      ]);

      let allDiscussionDocs = [];
      let allBugs = [];
      let selectedThreadId = new URLSearchParams(window.location.search).get(
        "thread",
      );
      const ui = {
        userDisplay: document.getElementById("user_display"),
        userAvatar: document.getElementById("user_avatar"),
        loginBtn: document.getElementById("loginBtn"),
        logoutBtn: document.getElementById("logoutBtn"),
        globalSearch: document.getElementById("global_search"),
        threadTitle: document.getElementById("thread_title"),
        threadInput: document.getElementById("thread_input"),
        submitThread: document.getElementById("submit_thread"),
        postsLoading: document.getElementById("posts_loading"),
        postsList: document.getElementById("posts_list"),
        bugTitle: document.getElementById("bug_title"),
        bugDesc: document.getElementById("bug_desc"),
        submitBug: document.getElementById("submit_bug"),
        bugsList: document.getElementById("bugs_list"),
        toast: document.getElementById("copy-toast"),
        postEditor: document.getElementById("post_editor"),
      };

      const escapeHTML = (str) =>
        String(str || "").replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[m],
        );
      const normalizeText = (value, max) =>
        String(value || "")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, max);

      const safeDate = (value) => {
        try {
          return value?.toDate?.().toLocaleDateString() || "Just now";
        } catch {
          return "Just now";
        }
      };
      const getFallbackAvatar = (name, color) =>
        `https://ui-avatars.com/api/?name=${encodeURIComponent(name || "U")}&background=1e1e2e&color=${color}`;
      const escapeSelector = (value) =>
        window.CSS?.escape ? window.CSS.escape(value) : String(value);
      const getSelectedThreadId = () =>
        String(selectedThreadId || "").trim() || null;

      const sanitizeAvatarUrl = (rawValue, fallbackUrl) => {
        const raw = String(rawValue || "").trim();
        if (!raw) return fallbackUrl;
        try {
          const parsed = new URL(raw);
          if (parsed.protocol !== "https:") return fallbackUrl;
          if (!avatarHostAllowlist.has(parsed.hostname)) return fallbackUrl;
          return parsed.toString();
        } catch {
          return fallbackUrl;
        }
      };

      window.showPage = (event, pageId) => {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
        event.currentTarget.classList.add("active");
      };

      const showToast = (msg) => {
        ui.toast.innerText = msg;
        ui.toast.classList.add("show");
        setTimeout(() => ui.toast.classList.remove("show"), 3000);
      };

      const setThreadRoute = (threadId) => {
        const url = new URL(window.location.href);
        if (threadId) {
          url.searchParams.set("thread", threadId);
          selectedThreadId = threadId;
        } else {
          url.searchParams.delete("thread");
          selectedThreadId = null;
        }
        window.history.pushState({}, "", url);
        filterAndRender();
      };

      const timestampToNumber = (value) => {
        if (!value) return 0;
        if (typeof value.seconds === "number") {
          return value.seconds * 1000 + Math.floor((value.nanoseconds || 0) / 1e6);
        }
        try {
          return value.toDate().getTime();
        } catch {
          return 0;
        }
      };

      const buildThreadList = (docs) => {
        const roots = docs
          .filter((item) => !item.parentId)
          .map((item) => ({ ...item, replies: [] }));
        const rootMap = new Map(roots.map((root) => [root.id, root]));

        docs
          .filter((item) => item.parentId)
          .forEach((reply) => {
            const parent = rootMap.get(reply.parentId);
            if (parent) parent.replies.push(reply);
          });

        roots.sort(
          (a, b) => timestampToNumber(b.createdAt) - timestampToNumber(a.createdAt),
        );
        roots.forEach((root) => {
          root.replies.sort(
            (a, b) => timestampToNumber(a.createdAt) - timestampToNumber(b.createdAt),
          );
        });
        return roots;
      };

      const setComposerState = (canPost) => {
        ui.threadTitle.disabled = !canPost;
        ui.threadInput.disabled = !canPost;
        ui.submitThread.disabled = !canPost;
        ui.bugTitle.disabled = !canPost;
        ui.bugDesc.disabled = !canPost;
        ui.submitBug.disabled = !canPost;

        if (!canPost) {
          ui.threadTitle.placeholder = "Log in to start a thread.";
          ui.threadInput.placeholder = "Log in to start a thread.";
          ui.bugTitle.placeholder = "Log in to report bugs.";
          ui.bugDesc.placeholder = "Log in to report bugs.";
        } else {
          ui.threadTitle.placeholder = "Thread title";
          ui.threadInput.placeholder =
            "Open a thread with context, question, or proposal...";
          ui.bugTitle.placeholder = "Bug summary | Project";
          ui.bugDesc.placeholder = "Steps to reproduce...";
        }
      };

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          ui.userDisplay.textContent = "Guest";
          ui.userAvatar.style.display = "none";
          ui.loginBtn.style.display = "inline-flex";
          ui.logoutBtn.style.display = "none";
          setComposerState(false);
          ui.postsLoading.style.display = "none";
          filterAndRender();
          return;
        }
        ui.userDisplay.textContent = user.displayName || "Anonymous Hacker";
        ui.userAvatar.src = sanitizeAvatarUrl(
          user.photoURL,
          getFallbackAvatar(user.displayName, "a6e3a1"),
        );
        ui.userAvatar.style.display = "block";
        ui.loginBtn.style.display = "none";
        ui.logoutBtn.style.display = "inline-flex";
        setComposerState(true);
        ui.postsLoading.style.display = "none";
        filterAndRender();
      });

      ui.logoutBtn.onclick = () => signOut(auth);

      const renderReply = (reply) => {
        const replyPhoto = sanitizeAvatarUrl(
          reply.photoURL,
          getFallbackAvatar(reply.username, "94e2d5"),
        );
        return `
          <div class="thread-reply">
            <div class="post-header thread-reply-header">
              <img src="${escapeHTML(replyPhoto)}" class="avatar-sm">
              <strong style="color: var(--teal);">${escapeHTML(reply.username || "Unknown")}</strong>
              <small style="margin-left: auto; color: var(--subtext0);">${safeDate(reply.createdAt)}</small>
            </div>
            <div class="post-content">${escapeHTML(reply.content)}</div>
          </div>`;
      };

      const renderThread = (thread, canReply, isDetailView = false) => {
        const userPhoto = sanitizeAvatarUrl(
          thread.photoURL,
          getFallbackAvatar(thread.username, "89b4fa"),
        );
        const threadTitle = normalizeText(thread.title, MAX_THREAD_TITLE_LENGTH);
        const replies = thread.replies.map(renderReply).join("");
        const threadId = escapeHTML(thread.id);
        const threadClasses = `post-card thread-root${isDetailView ? "" : " thread-clickable"}`;
        return `
          <article class="${threadClasses}" data-thread-id="${threadId}">
            <div class="post-header">
              <img src="${escapeHTML(userPhoto)}" class="avatar-sm">
              <strong style="color: var(--sky);">${escapeHTML(thread.username || "Unknown")}</strong>
              <small style="margin-left: auto; color: var(--subtext0);">${safeDate(thread.createdAt)}</small>
            </div>
            <h3 class="thread-title">${escapeHTML(threadTitle || "Untitled Thread")}</h3>
            <div class="post-content">${escapeHTML(thread.content || "")}</div>
            <div class="thread-meta">
              <span>${thread.replies.length} repl${thread.replies.length === 1 ? "y" : "ies"}</span>
              <button type="button" class="thread-reply-toggle" data-thread-id="${threadId}">Reply</button>
            </div>
            <div class="thread-replies">${replies || '<p class="tagline">No replies yet.</p>'}</div>
            <div class="reply-editor" data-thread-id="${threadId}" hidden>
              <textarea class="thread-reply-input" placeholder="${canReply ? "Reply to this thread..." : "Log in to reply."}" ${canReply ? "" : "disabled"}></textarea>
              <div style="display: flex; justify-content: flex-end; margin-top: 0.5rem">
                <button type="button" class="thread-reply-submit" data-thread-id="${threadId}" ${canReply ? "" : "disabled"}>Send Reply</button>
              </div>
            </div>
          </article>`;
      };

      const renderBug = (bug) => `
          <div class="post-card bug">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="bug-id">#BUG-${bug.id.substring(0, 6).toUpperCase()}</span>
              <span class="status-badge">${(bug.status || "open").toUpperCase()}</span>
            </div>
            <h3 style="margin: 10px 0 5px 0; font-size: 1rem; color: var(--text);">${escapeHTML(bug.title)}</h3>
            <p style="font-size: 0.85rem; color: var(--subtext0);">${escapeHTML(bug.description)}</p>
          </div>`;

      const filterAndRender = () => {
        const activeThreadId = getSelectedThreadId();
        const term = ui.globalSearch.value.toLowerCase();
        const canReply = Boolean(auth.currentUser);
        const allThreads = buildThreadList(allDiscussionDocs);
        const threads = allThreads.filter((thread) => {
          if (!term) return true;
          const rootMatches =
            (thread.title || "").toLowerCase().includes(term) ||
            (thread.content || "").toLowerCase().includes(term) ||
            (thread.username || "").toLowerCase().includes(term);
          if (rootMatches) return true;
          return thread.replies.some(
            (reply) =>
              (reply.content || "").toLowerCase().includes(term) ||
              (reply.username || "").toLowerCase().includes(term),
          );
        });

        if (activeThreadId) {
          const activeThread = allThreads.find((thread) => thread.id === activeThreadId);
          ui.postEditor.style.display = "none";
          ui.globalSearch.placeholder = "Thread view: go back to browse all threads.";
          ui.postsList.innerHTML = activeThread
            ? `<div class="thread-view-header">
                 <a href="/hub/" class="thread-back-link" data-thread-back="1">Back to all threads</a>
               </div>
               ${renderThread(activeThread, canReply, true)}`
            : `<div class="thread-view-header">
                 <a href="/hub/" class="thread-back-link" data-thread-back="1">Back to all threads</a>
               </div>
               <p class="tagline">Thread not found.</p>`;
        } else {
          ui.postEditor.style.display = "";
          ui.globalSearch.placeholder = "Search threads or bug IDs...";
          ui.postsList.innerHTML = threads.length
            ? threads.map((thread) => renderThread(thread, canReply)).join("")
            : '<p class="tagline">No threads found.</p>';
        }

        const fBugs = allBugs.filter(
          (b) =>
            (b.title || "").toLowerCase().includes(term) ||
            (b.description || "").toLowerCase().includes(term) ||
            (b.id || "").toLowerCase().includes(term),
        );

        ui.bugsList.innerHTML = fBugs.map(renderBug).join("");
      };

      onSnapshot(query(postsCol, orderBy("createdAt", "desc")), (snap) => {
        allDiscussionDocs = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        filterAndRender();
      });

      onSnapshot(query(bugsCol, orderBy("createdAt", "desc")), (snap) => {
        allBugs = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        filterAndRender();
      });

      ui.globalSearch.oninput = filterAndRender;

      ui.submitThread.onclick = async () => {
        const title = normalizeText(ui.threadTitle.value, MAX_THREAD_TITLE_LENGTH);
        const content = normalizeText(ui.threadInput.value, MAX_THREAD_BODY_LENGTH);
        if (title && content && auth.currentUser) {
          try {
            await addDoc(postsCol, {
              type: "thread",
              parentId: null,
              title,
              content,
              username: normalizeText(auth.currentUser.displayName, 80) || "User",
              photoURL: sanitizeAvatarUrl(auth.currentUser.photoURL, ""),
              uid: auth.currentUser.uid,
              createdAt: serverTimestamp(),
            });
            ui.threadTitle.value = "";
            ui.threadInput.value = "";
          } catch (e) {
            showToast("Transmission failed: Access denied.");
          }
        } else if (!title || !content) {
          showToast("Thread title or body is invalid.");
        } else {
          showToast("Log in to start a thread.");
        }
      };

      ui.postsList.onclick = async (event) => {
        const backToListLink = event.target.closest(".thread-back-link");
        if (backToListLink) {
          event.preventDefault();
          setThreadRoute(null);
          return;
        }

        const toggleButton = event.target.closest(".thread-reply-toggle");
        if (toggleButton) {
          const threadId = toggleButton.dataset.threadId;
          const editor = document.querySelector(
            `.reply-editor[data-thread-id="${escapeSelector(threadId)}"]`,
          );
          if (!editor) return;
          editor.hidden = !editor.hidden;
          if (!editor.hidden) {
            const input = editor.querySelector(".thread-reply-input");
            input?.focus();
          }
          return;
        }

        const submitButton = event.target.closest(".thread-reply-submit");
        if (submitButton) {
          if (!auth.currentUser) {
            showToast("Log in to reply.");
            return;
          }

          const threadId = submitButton.dataset.threadId;
          const editor = document.querySelector(
            `.reply-editor[data-thread-id="${escapeSelector(threadId)}"]`,
          );
          const replyInput = editor?.querySelector(".thread-reply-input");
          const content = normalizeText(replyInput?.value, MAX_REPLY_LENGTH);

          if (!content) {
            showToast("Reply is empty or too long.");
            return;
          }

          submitButton.disabled = true;
          try {
            await addDoc(postsCol, {
              type: "reply",
              parentId: threadId,
              content,
              username: normalizeText(auth.currentUser.displayName, 80) || "User",
              photoURL: sanitizeAvatarUrl(auth.currentUser.photoURL, ""),
              uid: auth.currentUser.uid,
              createdAt: serverTimestamp(),
            });
            if (replyInput) replyInput.value = "";
            if (editor) editor.hidden = true;
          } catch {
            showToast("Reply failed: Access denied.");
          } finally {
            submitButton.disabled = false;
          }
          return;
        }

        const clickableThread = event.target.closest(".thread-clickable");
        if (!clickableThread || getSelectedThreadId()) return;
        if (event.target.closest("a, button, textarea, input, label")) return;
        const threadId = clickableThread.dataset.threadId;
        if (threadId) {
          setThreadRoute(threadId);
        }
      };

      ui.submitBug.onclick = async () => {
        const bugTitle = normalizeText(ui.bugTitle.value, MAX_BUG_TITLE_LENGTH);
        const bugDesc = normalizeText(ui.bugDesc.value, MAX_BUG_DESC_LENGTH);
        if (bugTitle && bugDesc && auth.currentUser) {
          try {
            await addDoc(bugsCol, {
              title: bugTitle,
              description: bugDesc,
              username: normalizeText(auth.currentUser.displayName, 80) || "User",
              uid: auth.currentUser.uid,
              status: "open",
              createdAt: serverTimestamp(),
            });
            ui.bugTitle.value = "";
            ui.bugDesc.value = "";
            showToast("Bug logged. Happy hunting.");
          } catch (e) {
            showToast("Report failed: Access denied.");
          }
        } else if (!bugTitle || !bugDesc) {
          showToast("Bug title or description is invalid.");
        } else {
          showToast("Log in to report bugs.");
        }
      };

      window.addEventListener("popstate", () => {
        selectedThreadId = new URLSearchParams(window.location.search).get(
          "thread",
        );
        filterAndRender();
      });
    </script>
  </body>
</html>
